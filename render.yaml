services:
  - type: web
    name: mainfj-hub
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: starter
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1