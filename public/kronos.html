<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRONOS — Multi-Agent System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #050508; }
  canvas { display: block; }
  #tooltip {
    position: fixed; pointer-events: none; z-index: 100;
    background: #0D0D1A; border: 1px solid; border-radius: 8px;
    padding: 10px 14px; font-family: 'Inter', sans-serif;
    font-size: 11px; opacity: 0; transition: opacity 0.15s;
    min-width: 140px; max-width: 220px;
  }
  #tooltip .name { color: #fff; font-weight: bold; font-size: 12px; margin-bottom: 3px; }
  #tooltip .role { color: #8b8b9c; font-size: 10px; margin-bottom: 4px; }
  #tooltip .conn { color: #6b6b8c; font-size: 10px; }
  #popup {
    position: fixed; z-index: 200;
    background: #0D0D1A; border: 1px solid; border-radius: 12px;
    padding: 18px 20px; font-family: 'Inter', sans-serif;
    display: none; min-width: 220px; max-width: 300px;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
  }
  #popup .popup-title { color: #fff; font-weight: 600; font-size: 14px; margin-bottom: 4px; }
  #popup .popup-parent { color: #8b8b9c; font-size: 11px; margin-bottom: 10px; }
  #popup .popup-desc { color: #94A3B8; font-size: 12px; margin-bottom: 14px; line-height: 1.5; }
  #popup .popup-btn {
    display: block; width: 100%; padding: 9px 0;
    border-radius: 8px; font-family: 'Inter', sans-serif;
    font-size: 12px; font-weight: 500; cursor: pointer;
    text-align: center; text-decoration: none; border: none;
    transition: opacity 0.15s;
    color: #fff;
  }
  #popup .popup-btn:hover { opacity: 0.85; }
  #popup .popup-close {
    position: absolute; top: 10px; right: 12px;
    background: none; border: none; color: #64748B;
    font-size: 16px; cursor: pointer; padding: 2px 6px;
    font-family: 'Inter', sans-serif;
  }
  #popup .popup-close:hover { color: #fff; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="tooltip"></div>
<div id="popup">
  <button class="popup-close" id="popupClose">&times;</button>
  <div class="popup-title" id="popupTitle"></div>
  <div class="popup-parent" id="popupParent"></div>
  <div class="popup-desc" id="popupDesc"></div>
  <a class="popup-btn" id="popupBtn" target="_blank" rel="noopener"></a>
</div>

<script>
// ── Configuration ───────────────────────────────────────────────────────────
const COLORS = {
  orchestrator: { fill: '#7B61FF', glow: '#7B61FF', label: '#7B61FF' },
  winstats:     { fill: '#FF0046', glow: '#FF0046', label: '#FF0046' },
  architechia:  { fill: '#FF4F9A', glow: '#FF4F9A', label: '#FF4F9A' },
  growdata:     { fill: '#00E5B0', glow: '#00E5B0', label: '#00E5B0' },
  academia:     { fill: '#3B9EFF', glow: '#3B9EFF', label: '#3B9EFF' },
  personal:     { fill: '#39D353', glow: '#39D353', label: '#39D353' },
};

// ── KRONOS Topology ────────────────────────────────────────────────────────
// Eje Central → Ejes Sistema → Ejes Sectoriales
const NODE_DEFS = [
  // ═══ EJE CENTRAL ═══
  { id: 'kronos', name: 'KRONOS', role: 'Orchestrator', layer: 'orchestrator', fx: 0.40, fy: 0.50, r: 32 },

  // ═══ WIN STATS ═══
  { id: 'winstats',  name: 'WIN STATS',  role: 'Eje Sistema',   layer: 'winstats',    fx: 0.16, fy: 0.18, r: 22 },
  { id: 'ws-data',   name: 'DATA',        role: 'Métricas',      layer: 'winstats',    fx: 0.06, fy: 0.07, r: 14, desc: 'Analíticas y datos de rendimiento', url: '#', btnText: 'Ver Data' },
  { id: 'ws-finance',name: 'FINANCE',     role: 'Financiero',    layer: 'winstats',    fx: 0.14, fy: 0.05, r: 14, desc: 'Métricas financieras y reporting', url: 'https://main-fj-hub.vercel.app/finance', btnText: 'Ir a Finanzas' },
  { id: 'ws-accounts',name:'ACCOUNTS',    role: 'Cuentas',       layer: 'winstats',    fx: 0.24, fy: 0.08, r: 14, desc: 'Gestión de cuentas y balances', url: '#', btnText: 'Ver Accounts' },

  // ═══ ARCHITECHIA ═══
  { id: 'architechia',name:'ARCHITECHIA', role: 'Eje Sistema',   layer: 'architechia', fx: 0.50, fy: 0.14, r: 22 },
  { id: 'at-products',name:'PRODUCTS',    role: 'Productos',     layer: 'architechia', fx: 0.40, fy: 0.04, r: 14, desc: 'Portafolio de productos y servicios', url: '#', btnText: 'Ver Products' },
  { id: 'at-finances',name:'FINANCES',    role: 'Portafolio',    layer: 'architechia', fx: 0.50, fy: 0.04, r: 14, desc: 'Gestión financiera y portafolio', url: 'https://main-fj-hub.vercel.app/finance', btnText: 'Ir a Finanzas' },
  { id: 'at-leads',   name:'LEADS',       role: 'Prospectos',    layer: 'architechia', fx: 0.60, fy: 0.04, r: 14, desc: 'Generación y gestión de prospectos', url: '#', btnText: 'Ver Leads' },
  { id: 'at-accounts',name:'ACCOUNTS',    role: 'Cuentas',       layer: 'architechia', fx: 0.62, fy: 0.12, r: 14, desc: 'Cuentas y relaciones con clientes', url: '#', btnText: 'Ver Accounts' },

  // ═══ GROW DATA ═══
  { id: 'growdata',  name: 'GROW DATA',  role: 'Eje Sistema',   layer: 'growdata',    fx: 0.74, fy: 0.30, r: 22 },
  { id: 'gd-presales',name:'PRESALES',    role: 'Pre-ventas',    layer: 'growdata',    fx: 0.88, fy: 0.20, r: 14, desc: 'Pipeline de pre-ventas y leads', url: '#', btnText: 'Ver Presales' },
  { id: 'gd-finance',name:'FINANCE',      role: 'Revenue Data',  layer: 'growdata',    fx: 0.88, fy: 0.30, r: 14, desc: 'Datos de revenue y crecimiento', url: 'https://main-fj-hub.vercel.app/finance', btnText: 'Ir a Finanzas' },
  { id: 'gd-certs',  name:'CERTIFICATIONS',role:'Certificados',  layer: 'growdata',    fx: 0.88, fy: 0.40, r: 14, desc: 'Certificaciones y cumplimiento', url: '#', btnText: 'Ver Certs' },

  // ═══ ACADEMIA ═══
  { id: 'academia',  name: 'ACADEMIA',   role: 'Eje Sistema',   layer: 'academia',    fx: 0.68, fy: 0.68, r: 22 },
  { id: 'ac-tesis',  name: 'TESIS',       role: 'Investigación', layer: 'academia',    fx: 0.82, fy: 0.60, r: 14, desc: 'Proyectos de investigación y tesis', url: '#', btnText: 'Ver Tesis' },
  { id: 'ac-certs',  name: 'CERTIFICATIONS',role:'Certificados', layer: 'academia',    fx: 0.82, fy: 0.70, r: 14, desc: 'Certificaciones académicas', url: '#', btnText: 'Ver Certs' },
  { id: 'ac-roadmaps',name:'ROADMAPS',    role: 'Planes',        layer: 'academia',    fx: 0.82, fy: 0.80, r: 14, desc: 'Roadmaps y planes de estudio', url: '#', btnText: 'Ver Roadmaps' },

  // ═══ PERSONAL ═══
  { id: 'personal',  name: 'PERSONAL',   role: 'Eje Sistema',   layer: 'personal',    fx: 0.28, fy: 0.78, r: 22 },
  { id: 'pe-finance',name:'FINANCE',      role: 'Finanzas Pers.',layer: 'personal',    fx: 0.14, fy: 0.72, r: 14, desc: 'Finanzas personales y presupuesto', url: 'https://main-fj-hub.vercel.app/finance', btnText: 'Ir a Finanzas' },
  { id: 'pe-hubfj',  name: 'HUB FJ',      role: 'Hub Central',   layer: 'personal',    fx: 0.20, fy: 0.85, r: 14, desc: 'Centro de operaciones personal', url: '#', btnText: 'Ver Hub FJ' },
  { id: 'pe-health', name: 'HEALTH',      role: 'Salud',         layer: 'personal',    fx: 0.32, fy: 0.88, r: 14, desc: 'Seguimiento de salud y bienestar', url: '#', btnText: 'Ver Health' },
  { id: 'pe-sports', name: 'SPORTS',      role: 'Deportes',      layer: 'personal',    fx: 0.42, fy: 0.85, r: 14, desc: 'Actividades deportivas y metas', url: '#', btnText: 'Ver Sports' },
];

const EDGE_DEFS = [
  // KRONOS → Ejes Sistema
  { from: 'kronos', to: 'winstats' },
  { from: 'kronos', to: 'architechia' },
  { from: 'kronos', to: 'growdata' },
  { from: 'kronos', to: 'academia' },
  { from: 'kronos', to: 'personal' },

  // WIN STATS → Sectoriales
  { from: 'winstats', to: 'ws-data' },
  { from: 'winstats', to: 'ws-finance' },
  { from: 'winstats', to: 'ws-accounts' },

  // ARCHITECHIA → Sectoriales
  { from: 'architechia', to: 'at-products' },
  { from: 'architechia', to: 'at-finances' },
  { from: 'architechia', to: 'at-leads' },
  { from: 'architechia', to: 'at-accounts' },

  // GROW DATA → Sectoriales
  { from: 'growdata', to: 'gd-presales' },
  { from: 'growdata', to: 'gd-finance' },
  { from: 'growdata', to: 'gd-certs' },

  // ACADEMIA → Sectoriales
  { from: 'academia', to: 'ac-tesis' },
  { from: 'academia', to: 'ac-certs' },
  { from: 'academia', to: 'ac-roadmaps' },

  // PERSONAL → Sectoriales
  { from: 'personal', to: 'pe-finance' },
  { from: 'personal', to: 'pe-hubfj' },
  { from: 'personal', to: 'pe-health' },
  { from: 'personal', to: 'pe-sports' },
];

// ── Canvas Setup ────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ── Grid Background (offscreen, cached) ────────────────────────────────────
const gridCanvas = document.createElement('canvas');
let gridValid = false;
function renderGrid() {
  if (gridValid && gridCanvas.width === W && gridCanvas.height === H) return;
  gridCanvas.width = W;
  gridCanvas.height = H;
  const g = gridCanvas.getContext('2d');
  g.clearRect(0, 0, W, H);

  // Radial gradient
  const grd = g.createRadialGradient(W * 0.40, H * 0.50, 0, W * 0.5, H * 0.5, Math.max(W, H) * 0.7);
  grd.addColorStop(0, '#0a0a20');
  grd.addColorStop(0.5, '#050510');
  grd.addColorStop(1, '#050508');
  g.fillStyle = grd;
  g.fillRect(0, 0, W, H);

  // Dotted grid
  const spacing = 40;
  g.fillStyle = 'rgba(255,255,255,0.04)';
  for (let x = spacing; x < W; x += spacing) {
    for (let y = spacing; y < H; y += spacing) {
      g.beginPath();
      g.arc(x, y, 0.8, 0, Math.PI * 2);
      g.fill();
    }
  }

  // Dashed grid lines (subtle)
  g.strokeStyle = 'rgba(255,255,255,0.03)';
  g.lineWidth = 0.5;
  g.setLineDash([2, 20]);
  for (let x = spacing * 2; x < W; x += spacing * 2) {
    g.beginPath(); g.moveTo(x, 0); g.lineTo(x, H); g.stroke();
  }
  for (let y = spacing * 2; y < H; y += spacing * 2) {
    g.beginPath(); g.moveTo(0, y); g.lineTo(W, y); g.stroke();
  }
  g.setLineDash([]);
  gridValid = true;
}

// ── Initialize Nodes ────────────────────────────────────────────────────────
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return { r, g, b };
}

const nodes = NODE_DEFS.map(n => ({
  ...n,
  x: n.fx * W,
  y: n.fy * H,
  baseX: n.fx * W,
  baseY: n.fy * H,
  phase: Math.random() * Math.PI * 2,
  color: COLORS[n.layer],
  rgb: hexToRgb(COLORS[n.layer].fill),
  pulse: 0,
}));

function getNode(id) { return nodes.find(n => n.id === id); }
const kronos = getNode('kronos');

// ── Connection Map ──────────────────────────────────────────────────────────
EDGE_DEFS.forEach(e => {
  e.fromNode = getNode(e.from);
  e.toNode = getNode(e.to);
});

// ── Particles ───────────────────────────────────────────────────────────────
const PARTICLES_PER_EDGE = 3;
const TRAIL_LENGTH = 7;

const particles = [];

function initParticles() {
  particles.length = 0;
  EDGE_DEFS.forEach(edge => {
    const { fromNode, toNode } = edge;
    for (let i = 0; i < PARTICLES_PER_EDGE; i++) {
      // Determine direction: away from KRONOS
      const dFrom = Math.hypot(fromNode.baseX - kronos.baseX, fromNode.baseY - kronos.baseY);
      const dTo = Math.hypot(toNode.baseX - kronos.baseX, toNode.baseY - kronos.baseY);
      // Particle goes from closer-to-KRONOS node → farther-from-KRONOS node
      const goesForward = dFrom < dTo; // true = t: 0→1, false = t: 1→0
      particles.push({
        edge,
        fromNode,
        toNode,
        t: goesForward ? Math.random() : 1 - Math.random(),
        speed: 0.0004 + Math.random() * 0.0008,
        goesForward,
        trail: [],
        phase: Math.random(),
      });
    }
  });
}
initParticles();

// ── Math Helpers ────────────────────────────────────────────────────────────
function quadraticBez(p0, p1, p2, t) {
  const mt = 1 - t;
  return {
    x: mt * mt * p0.x + 2 * mt * t * p1.x + t * t * p2.x,
    y: mt * mt * p0.y + 2 * mt * t * p1.y + t * t * p2.y,
  };
}

function controlPoint(a, b, arcOffset) {
  const mx = (a.x + b.x) / 2;
  const my = (a.y + b.y) / 2;
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const len = Math.hypot(dx, dy) || 1;
  const offset = arcOffset || len * 0.25;
  return { x: mx + (-dy / len) * offset, y: my + (dx / len) * offset };
}

// ── Connection tracking for selection ───────────────────────────────────────
function getConnectedNodes(nodeId) {
  const connected = new Set([nodeId]);
  EDGE_DEFS.forEach(e => {
    if (e.from === nodeId || e.to === nodeId) {
      connected.add(e.from);
      connected.add(e.to);
    }
  });
  return connected;
}

function getConnectionCount(nodeId) {
  return EDGE_DEFS.filter(e => e.from === nodeId || e.to === nodeId).length;
}

// ── State ───────────────────────────────────────────────────────────────────
let selectedNodeId = null;
let hoveredNodeId = null;
let mouseX = -100, mouseY = -100;
let dragNode = null;
let dragOffX = 0, dragOffY = 0;
let time = 0;
let tooltipNode = null;
let popupNode = null;

// ── Popup ───────────────────────────────────────────────────────────────────
const popup = document.getElementById('popup');
const popupTitle = document.getElementById('popupTitle');
const popupParent = document.getElementById('popupParent');
const popupDesc = document.getElementById('popupDesc');
const popupBtn = document.getElementById('popupBtn');
const popupClose = document.getElementById('popupClose');

function showPopup(node, mx, my) {
  popupNode = node;
  const parent = getNode(
    EDGE_DEFS.find(e => e.to === node.id || e.from === node.id)?.from || ''
  );
  popupTitle.textContent = node.name;
  popupParent.textContent = parent ? `▸ ${parent.name}` : '';
  popupDesc.textContent = node.desc || `${node.role} — ${node.layer.toUpperCase()}`;
  popupBtn.textContent = node.btnText || 'Abrir';
  popupBtn.href = node.url || '#';
  popupBtn.style.background = COLORS[node.layer]?.fill || '#7B61FF';
  popup.style.borderColor = COLORS[node.layer]?.fill || '#7B61FF';
  popup.style.display = 'block';

  // Position
  const pw = popup.offsetWidth || 240;
  const ph = popup.offsetHeight || 180;
  let tx = mx + 18;
  let ty = my - ph / 2;
  if (tx + pw + 10 > W) tx = mx - pw - 18;
  if (ty < 10) ty = 10;
  if (ty + ph + 10 > H) ty = H - ph - 10;
  popup.style.left = tx + 'px';
  popup.style.top = ty + 'px';
}

function hidePopup() {
  popupNode = null;
  popup.style.display = 'none';
}

popupClose.addEventListener('click', (e) => {
  e.stopPropagation();
  hidePopup();
});

// Close popup on canvas click outside
canvas.addEventListener('click', (e) => {
  if (popupNode && e.target === canvas) {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const n = nodeAt(mx, my);
    if (!n || n.id !== popupNode.id) {
      hidePopup();
    }
  }
});

// ── Edge Rendering ──────────────────────────────────────────────────────────
function drawEdge(from, to, dimmed, isMain) {
  const a = { x: from.x, y: from.y };
  const b = { x: to.x, y: to.y };
  const cp = controlPoint(a, b);
  const edgeColor = isMain ? '#FFFFFF' : COLORS[from.layer].fill;

  // Glow layer
  ctx.save();
  ctx.shadowColor = edgeColor;
  ctx.shadowBlur = isMain ? 8 : 4;
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.quadraticCurveTo(cp.x, cp.y, b.x, b.y);
  ctx.strokeStyle = edgeColor;
  ctx.lineWidth = isMain ? 2.2 : 1.4;
  ctx.globalAlpha = dimmed ? (isMain ? 0.12 : 0.06) : (isMain ? 0.45 : 0.28);
  ctx.stroke();
  ctx.restore();

  // Core line
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.quadraticCurveTo(cp.x, cp.y, b.x, b.y);
  ctx.strokeStyle = `rgba(255,255,255,${dimmed ? (isMain ? 0.12 : 0.06) : (isMain ? 0.3 : 0.15)})`;
  ctx.lineWidth = isMain ? 1 : 0.6;
  ctx.stroke();
  ctx.globalAlpha = 1;
}

function drawEdgeHighlight(from, to) {
  const a = { x: from.x, y: from.y };
  const b = { x: to.x, y: to.y };
  const cp = controlPoint(a, b);

  ctx.save();
  ctx.shadowColor = '#ffffff';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.quadraticCurveTo(cp.x, cp.y, b.x, b.y);
  ctx.strokeStyle = 'rgba(255,255,255,0.7)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();
}

// ── Particle Rendering ──────────────────────────────────────────────────────
function drawParticle(p, dimmed) {
  const a = { x: p.fromNode.x, y: p.fromNode.y };
  const b = { x: p.toNode.x, y: p.toNode.y };
  const cp = controlPoint(a, b);
  const pos = quadraticBez(a, cp, b, p.t);
  const pColor = '#FFB020';

  // Draw trail
  for (let i = 0; i < p.trail.length; i++) {
    const alpha = ((i + 1) / p.trail.length) * (dimmed ? 0.1 : 0.6);
    const r = 2.5 * ((i + 1) / p.trail.length);
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(p.trail[i].x, p.trail[i].y, r, 0, Math.PI * 2);
    ctx.fillStyle = pColor;
    ctx.fill();
  }

  // Draw head
  ctx.globalAlpha = dimmed ? 0.1 : 0.9;
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, 3, 0, Math.PI * 2);
  ctx.fillStyle = pColor;
  ctx.fill();

  // Glow
  ctx.globalAlpha = dimmed ? 0.05 : 0.4;
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, 5, 0, Math.PI * 2);
  ctx.fillStyle = pColor;
  ctx.fill();

  ctx.globalAlpha = 1;
}

// ── Node Rendering ──────────────────────────────────────────────────────────
function drawNode(node, dimmed) {
  const { x, y, r, color, rgb } = node;
  const isHovered = hoveredNodeId === node.id;
  const isSelected = selectedNodeId === node.id;
  const scale = isHovered ? 1.08 : 1;

  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);

  // ── Outer halo ring ──
  const haloAlpha = dimmed ? 0.04 : (0.12 + Math.sin(time * 2.5 + node.phase) * 0.04);
  ctx.globalAlpha = haloAlpha;
  ctx.beginPath();
  ctx.arc(0, 0, r * 1.55, 0, Math.PI * 2);
  ctx.fillStyle = color.fill;
  ctx.fill();

  // ── Mid glow ring (breathes) ──
  const breathe = 0.22 + Math.sin(time * 2 + node.pulse) * 0.08;
  ctx.globalAlpha = dimmed ? 0.06 : breathe;
  ctx.beginPath();
  ctx.arc(0, 0, r * 1.25, 0, Math.PI * 2);
  ctx.fillStyle = color.fill;
  ctx.fill();

  // Shadow glow
  ctx.shadowColor = color.glow;
  ctx.shadowBlur = isSelected ? r * 1.5 : (r * 0.6);

  // ── Core circle (dark gray, bright colored border) ──
  ctx.globalAlpha = dimmed ? 0.25 : 1;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fillStyle = '#14141e';
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.strokeStyle = color.glow;
  ctx.lineWidth = r >= 22 ? 2.5 : 1.8;
  ctx.stroke();

  // Second subtle border
  ctx.beginPath();
  ctx.arc(0, 0, r + 2, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.3)`;
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;

  // ── Node icon ──
  const iSize = r >= 22 ? r * 0.65 : r * 0.6;
  const iconAlpha = dimmed ? 0.25 : 0.9;
  drawNodeIcon(ctx, node.id, iSize, iconAlpha, r);

  // ── Selected highlight border ──
  ctx.globalAlpha = 1;
  if (isSelected) {
    ctx.beginPath();
    ctx.arc(0, 0, r + 6, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,255,255,0.7)`;
    ctx.lineWidth = 2;
    ctx.setLineDash([8, 4]);
    ctx.lineDashOffset = -time * 40;
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // ── Labels ABOVE the circle ──
  const fontSize = r >= 32 ? 11 : (r >= 22 ? 10 : 8);
  const padX = 8;
  const padY = 3;
  const labelY = -(r + padY + fontSize);

  if (dimmed && !isSelected && !isHovered) {
    ctx.globalAlpha = 0.2;
  } else {
    ctx.globalAlpha = 0.95;
  }

  // Name pill above node
  const fontWeight = r >= 22 ? '600' : '500';
  ctx.font = `${fontWeight} ${fontSize}px "Inter", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const nameW = ctx.measureText(node.name).width;

  // Pill background
  ctx.fillStyle = 'rgba(5,5,8,0.85)';
  ctx.beginPath();
  roundRect(ctx, -nameW / 2 - padX, labelY - fontSize / 2 - padY, nameW + padX * 2, fontSize + padY * 2, r >= 22 ? 4 : 3);
  ctx.fill();

  // Pill border
  ctx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${r >= 22 ? 0.5 : 0.3})`;
  ctx.lineWidth = 0.8;
  ctx.stroke();

  // Name text
  ctx.shadowColor = 'rgba(255,255,255,0.5)';
  ctx.shadowBlur = 2;
  ctx.fillStyle = '#ffffff';
  ctx.fillText(node.name, 0, labelY);
  ctx.shadowBlur = 0;

  // Sublabel (only on hover)
  if (isHovered && (!dimmed || isHovered || isSelected)) {
    const subLabelFontSize = r >= 22 ? 7 : 6;
    ctx.font = `500 ${subLabelFontSize}px "Inter", sans-serif`;
    const subY = labelY - fontSize / 2 - padY - subLabelFontSize * 0.6 - 3;
    const subW = ctx.measureText(node.role).width;

    ctx.globalAlpha = isHovered ? 0.75 : 0.5;
    ctx.fillStyle = 'rgba(5,5,8,0.75)';
    ctx.beginPath();
    roundRect(ctx, -subW / 2 - padX + 2, subY - subLabelFontSize / 2 - padY + 1, subW + (padX - 2) * 2, subLabelFontSize + (padY - 1) * 2, 3);
    ctx.fill();

    ctx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.2)`;
    ctx.lineWidth = 0.5;
    ctx.stroke();

    ctx.fillStyle = color.fill;
    ctx.fillText(node.role, 0, subY);
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y);
  c.arcTo(x + w, y, x + w, y + r, r);
  c.lineTo(x + w, y + h - r);
  c.arcTo(x + w, y + h, x + w - r, y + h, r);
  c.lineTo(x + r, y + h);
  c.arcTo(x, y + h, x, y + h - r, r);
  c.lineTo(x, y + r);
  c.arcTo(x, y, x + r, y, r);
  c.closePath();
}

// ── Node Icons (canvas paths) ──────────────────────────────────────────────
function drawNodeIcon(ctx, id, s, alpha, r) {
  ctx.save();
  ctx.fillStyle = `rgba(255,255,255,${alpha})`;
  ctx.strokeStyle = `rgba(255,255,255,${Math.min(alpha + 0.2, 1)})`;
  ctx.lineWidth = r >= 22 ? 1.8 : 1.4;
  ctx.lineCap = 'round';

  if (r >= 22) {
    // ── Hub icon: central node + 3 radiating connections ──
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.34, 0, Math.PI * 2);
    ctx.fill();

    for (let i = 0; i < 3; i++) {
      const angle = (i * Math.PI * 2) / 3 - Math.PI / 2;
      const innerR = s * 0.42;
      const outerR = s * 0.85;
      ctx.beginPath();
      ctx.moveTo(Math.cos(angle) * innerR, Math.sin(angle) * innerR);
      ctx.lineTo(Math.cos(angle) * outerR, Math.sin(angle) * outerR);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(Math.cos(angle) * outerR, Math.sin(angle) * outerR, s * 0.2, 0, Math.PI * 2);
      ctx.fill();
    }
  } else {
    // ── 3D Folder icon for sectoriales ──
    const foldH = s * 0.22;
    const bodyW = s * 1.4;
    const bodyH = s * 1.1;
    const tabW = s * 0.6;

    // 3D shadow/depth layer (offset bottom-right)
    ctx.fillStyle = `rgba(255,255,255,${alpha * 0.3})`;
    ctx.beginPath();
    ctx.moveTo(-bodyW / 2 + 1.5, -bodyH / 2 + foldH - 1);
    ctx.lineTo(-bodyW / 2 + tabW + 1.5, -bodyH / 2 + foldH - 1);
    ctx.lineTo(-bodyW / 2 + tabW + foldH * 0.6 + 1.5, -bodyH / 2 - 0.5);
    ctx.lineTo(bodyW / 2 + 1.5, -bodyH / 2 - 0.5);
    ctx.lineTo(bodyW / 2 + 1.5, bodyH / 2 + 1.5);
    ctx.lineTo(-bodyW / 2 + 1.5, bodyH / 2 + 1.5);
    ctx.closePath();
    ctx.fill();

    // Main folder body
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.strokeStyle = `rgba(255,255,255,${Math.min(alpha + 0.2, 1)})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-bodyW / 2, -bodyH / 2 + foldH);
    ctx.lineTo(-bodyW / 2 + tabW, -bodyH / 2 + foldH);
    ctx.lineTo(-bodyW / 2 + tabW + foldH * 0.6, -bodyH / 2);
    ctx.lineTo(bodyW / 2, -bodyH / 2);
    ctx.lineTo(bodyW / 2, bodyH / 2);
    ctx.lineTo(-bodyW / 2, bodyH / 2);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Tab fold highlight (top edge glow)
    ctx.strokeStyle = `rgba(255,255,255,${Math.min(alpha + 0.3, 1)})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-bodyW / 2 + tabW, -bodyH / 2 + foldH);
    ctx.lineTo(-bodyW / 2 + tabW + foldH * 0.6, -bodyH / 2);
    ctx.stroke();

    // Subtle inner line on folder body
    ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.3})`;
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.moveTo(-bodyW / 2, -bodyH / 2 + foldH);
    ctx.lineTo(bodyW / 2 - 1, -bodyH / 2 + foldH);
    ctx.stroke();
  }

  ctx.restore();
}

// ── KRONOS orbit rings ──────────────────────────────────────────────────────
function drawKronosOrbits() {
  const k = kronos;
  const dimmed = selectedNodeId && selectedNodeId !== 'kronos';

  ctx.save();
  ctx.translate(k.x, k.y);

  // Persistent radial glow
  const grd = ctx.createRadialGradient(0, 0, k.r * 0.5, 0, 0, k.r * 2.5);
  grd.addColorStop(0, 'rgba(123,97,255,0.15)');
  grd.addColorStop(0.5, 'rgba(123,97,255,0.04)');
  grd.addColorStop(1, 'rgba(123,97,255,0)');
  ctx.globalAlpha = dimmed ? 0.3 : 1;
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(0, 0, k.r * 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Orbit ring 1
  ctx.globalAlpha = dimmed ? 0.1 : 0.15;
  ctx.beginPath();
  ctx.ellipse(0, 0, k.r * 1.6, k.r * 1.2, time * 0.3, 0, Math.PI * 2);
  ctx.strokeStyle = '#7B61FF';
  ctx.lineWidth = 0.8;
  ctx.setLineDash([3, 12]);
  ctx.lineDashOffset = time * 30;
  ctx.stroke();

  // Orbit ring 2
  ctx.beginPath();
  ctx.ellipse(0, 0, k.r * 2.0, k.r * 1.0, -time * 0.4 + 1.2, 0, Math.PI * 2);
  ctx.strokeStyle = '#7B61FF';
  ctx.lineWidth = 0.6;
  ctx.setLineDash([2, 16]);
  ctx.lineDashOffset = -time * 25;
  ctx.stroke();

  ctx.setLineDash([]);
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ── HUD ─────────────────────────────────────────────────────────────────────
function drawHUD() {
  // Bottom-left status
  const statusText = selectedNodeId
    ? `ACTIVE NODE: ${getNode(selectedNodeId).name.toUpperCase()}`
    : 'SYSTEM ONLINE';

  ctx.font = '400 10px "Inter", sans-serif';
  const tw = ctx.measureText(statusText).width;

  // Blinking cursor
  const blink = Math.sin(time * 5) > 0;

  ctx.fillStyle = '#39D353';
  ctx.globalAlpha = 0.9;
  ctx.fillText(statusText, 18, H - 18);
  if (blink) {
    ctx.fillRect(18 + tw + 2, H - 28, 7, 14);
  }
  ctx.globalAlpha = 1;

  // Top-right MRR counter
  const mrrText = 'MRR $30,200';
  ctx.font = '400 10px "Inter", sans-serif';
  const mrrW = ctx.measureText(mrrText).width;
  ctx.fillStyle = '#FFB020';
  ctx.globalAlpha = 0.7;
  ctx.fillText(mrrText, W - mrrW - 18, 24);
  ctx.globalAlpha = 1;
}

// ── Tooltip (DOM) ───────────────────────────────────────────────────────────
function updateTooltip() {
  if (tooltipNode) {
    const n = tooltipNode;
    tooltip.innerHTML = `
      <div class="name">${n.name}</div>
      <div class="role">${n.role}</div>
      <div class="conn">↔ ${getConnectionCount(n.id)} connections</div>
    `;
    tooltip.style.borderColor = n.color.fill;
    tooltip.style.opacity = '1';

    // Position: offset from cursor, avoid canvas edges
    const rect = tooltip.getBoundingClientRect();
    const tw = rect.width || 140;
    const th = rect.height || 70;
    let tx = mouseX + 18;
    let ty = mouseY + 18;
    if (tx + tw + 10 > window.innerWidth) tx = mouseX - tw - 18;
    if (ty + th + 10 > window.innerHeight) ty = mouseY - th - 18;
    if (tx < 5) tx = 5;
    if (ty < 5) ty = 5;
    tooltip.style.left = tx + 'px';
    tooltip.style.top = ty + 'px';
  } else {
    tooltip.style.opacity = '0';
  }
}

// ── Main Render ─────────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, W, H);

  // Background grid
  renderGrid();
  ctx.drawImage(gridCanvas, 0, 0);

  // KRONOS orbits (behind everything)
  drawKronosOrbits();

  // Determine connected nodes if something is selected
  let connectedSet = null;
  if (selectedNodeId) {
    connectedSet = getConnectedNodes(selectedNodeId);
  }

  // Draw edges
  const mainEdges = ['kronos'];
  EDGE_DEFS.forEach(edge => {
    const highlight = selectedNodeId && (edge.from === selectedNodeId || edge.to === selectedNodeId);
    const isMain = edge.from === 'kronos' || edge.to === 'kronos';
    if (highlight) {
      drawEdgeHighlight(edge.fromNode, edge.toNode);
    } else {
      const dimmed = !!selectedNodeId;
      drawEdge(edge.fromNode, edge.toNode, dimmed, isMain);
    }
  });

  // Update & draw particles
  particles.forEach(p => {
    // Move particle
    if (p.goesForward) {
      p.t += p.speed;
      if (p.t > 1) p.t -= 1;
    } else {
      p.t -= p.speed;
      if (p.t < 0) p.t += 1;
    }

    // Update trail
    const a = { x: p.fromNode.x, y: p.fromNode.y };
    const b = { x: p.toNode.x, y: p.toNode.y };
    const cp = controlPoint(a, b);
    const pos = quadraticBez(a, cp, b, p.t);
    p.trail.push({ x: pos.x, y: pos.y });
    if (p.trail.length > TRAIL_LENGTH) p.trail.shift();

    // Draw
    const edgeInHighlight = selectedNodeId &&
      (p.edge.from === selectedNodeId || p.edge.to === selectedNodeId);
    drawParticle(p, !!selectedNodeId && !edgeInHighlight);
  });

  // Draw nodes
  nodes.forEach(node => {
    const dimmed = connectedSet && !connectedSet.has(node.id);
    drawNode(node, dimmed);
  });

  // HUD
  drawHUD();

  // Tooltip
  updateTooltip();
}

// ── Node float animation ───────────────────────────────────────────────────
function updateNodePositions() {
  nodes.forEach(node => {
    if (dragNode === node) return; // Don't animate dragged node
    const amp = node.id === 'kronos' ? 1.5 : (node.r >= 20 ? 2 : 1.5);
    const floatX = Math.sin(time * 0.6 + node.phase) * amp;
    const floatY = Math.cos(time * 0.7 + node.phase + 1.3) * amp;
    node.x = node.baseX + floatX;
    node.y = node.baseY + floatY;
    node.pulse = (node.pulse + 0.01) % (Math.PI * 2);
  });
}

// ── Find node under cursor ──────────────────────────────────────────────────
function nodeAt(mx, my) {
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    const dist = Math.hypot(mx - n.x, my - n.y);
    if (dist <= n.r + 10) return n;
  }
  return null;
}

// ── Canvas event handlers ───────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;

  if (dragNode) {
    dragNode.baseX = Math.max(dragNode.r, Math.min(W - dragNode.r, mouseX - dragOffX));
    dragNode.baseY = Math.max(dragNode.r, Math.min(H - dragNode.r, mouseY - dragOffY));
    return;
  }

  const n = nodeAt(mouseX, mouseY);
  hoveredNodeId = n ? n.id : null;
  tooltipNode = n || null;
  canvas.style.cursor = n ? 'pointer' : 'default';
});

canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const n = nodeAt(mx, my);
  if (n) {
    if (n.r < 22) {
      // Sectorial: show popup
      selectedNodeId = null;
      showPopup(n, mx, my);
    } else {
      // Hub / KRONOS: select + drag
      hidePopup();
      selectedNodeId = n.id;
      dragNode = n;
      dragOffX = mx - n.baseX;
      dragOffY = my - n.baseY;
    }
  } else {
    hidePopup();
    selectedNodeId = null;
  }
});

canvas.addEventListener('mouseup', () => {
  if (dragNode) {
    dragNode._wasDragged = true;
    dragNode = null;
  }
});

canvas.addEventListener('mouseleave', () => {
  hoveredNodeId = null;
  tooltipNode = null;
  dragNode = null;
});

canvas.addEventListener('dblclick', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const n = nodeAt(mx, my);
  if (!n) {
    selectedNodeId = null;
  }
});

// ── Responsive reposition ───────────────────────────────────────────────────
window.addEventListener('resize', () => {
  resize();
  gridValid = false;
  nodes.forEach(n => {
    const def = NODE_DEFS.find(d => d.id === n.id);
    if (def && !n._wasDragged) {
      n.baseX = def.fx * W;
      n.baseY = def.fy * H;
    }
  });
});

// ── Animation Loop ──────────────────────────────────────────────────────────
function animate(ts) {
  time = ts * 0.001;
  updateNodePositions();
  render();
  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
